services:
  postgres-dwh:
    image: postgres:16
    container_name: postgres-dwh
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: dwh
    ports:
      - "5432:5432"
    volumes:
      - postgres_dwh_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      - ./materials/lecture_01_postgres/data:/data/lecture_01:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d dwh"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-airflow:
    image: postgres:16
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin password123 &&
      mc mb --ignore-existing local/datalake &&
      mc anonymous set download local/datalake
      "

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    environment:
      CLUSTER_NAME: data-engineering-lab
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
    ports:
      - "8020:8020"
      - "9870:9870"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    depends_on:
      - namenode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      HDFS_CONF_dfs_datanode_data_dir: file:///hadoop/dfs/data
      SERVICE_PRECONDITION: namenode:9870
    ports:
      - "9864:9864"
    volumes:
      - hadoop_datanode:/hadoop/dfs/data

  hive-metastore-postgresql:
    image: bde2020/hive-metastore-postgresql:2.3.0
    container_name: hive-metastore-postgresql
    ports:
      - "15432:5432"
    volumes:
      - hive_metastore_postgres_data:/var/lib/postgresql/data

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-metastore
    depends_on:
      - namenode
      - datanode
      - hive-metastore-postgresql
    command: bash /opt/hive/bin/metastore-entrypoint.sh
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      HIVE_SITE_CONF_javax_jdo_option_ConnectionURL: jdbc:postgresql://hive-metastore-postgresql/metastore
      HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName: org.postgresql.Driver
      HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName: hive
      HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword: hive
      SERVICE_PRECONDITION: namenode:9870 datanode:9864 hive-metastore-postgresql:5432
    ports:
      - "9083:9083"
    volumes:
      - ./docker/hive/metastore-entrypoint.sh:/opt/hive/bin/metastore-entrypoint.sh:ro

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-server
    depends_on:
      - hive-metastore
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      HIVE_SITE_CONF_javax_jdo_option_ConnectionURL: jdbc:postgresql://hive-metastore-postgresql/metastore
      HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName: org.postgresql.Driver
      HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName: hive
      HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword: hive
      HIVE_SITE_CONF_hive_metastore_uris: thrift://hive-metastore:9083
      SERVICE_PRECONDITION: hive-metastore:9083
    ports:
      - "10000:10000"

  spark-master:
    build:
      context: ./docker/spark
    container_name: spark-master
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
      HADOOP_USER_NAME: spark
      PYSPARK_PYTHON: /opt/bitnami/python/bin/python
      PYSPARK_DRIVER_PYTHON: /opt/bitnami/python/bin/python
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./:/app
      - ./materials:/materials

  spark-worker:
    build:
      context: ./docker/spark
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      HADOOP_USER_NAME: spark
      PYSPARK_PYTHON: /opt/bitnami/python/bin/python
      PYSPARK_DRIVER_PYTHON: /opt/bitnami/python/bin/python
    ports:
      - "8081:8081"
    volumes:
      - ./:/app
      - ./materials:/materials

  jupyter:
    build:
      context: ./docker/spark
    container_name: jupyter
    depends_on:
      - spark-master
      - spark-worker
      - postgres-dwh
      - minio
      - namenode
      - datanode
      - hive-metastore
      - hive-server
    environment:
      SPARK_MASTER_URL: spark://spark-master:7077
      HADOOP_CONF_DIR: /opt/bitnami/spark/conf
      HADOOP_USER_NAME: spark
      SPARK_CONF_DIR: /opt/bitnami/spark/conf
      HOME: /tmp
      SPARK_SUBMIT_OPTS: -Duser.home=/tmp
      PYSPARK_PYTHON: /opt/bitnami/python/bin/python
      PYSPARK_DRIVER_PYTHON: /opt/bitnami/python/bin/python
      POSTGRES_HOST: postgres-dwh
      POSTGRES_PORT: 5432
      POSTGRES_DB: dwh
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password123
      S3_BUCKET: datalake
      HDFS_NAMENODE_URL: hdfs://namenode:8020
      HDFS_WEBHDFS_URL: http://namenode:9870
      HIVE_METASTORE_URI: thrift://hive-metastore:9083
      HIVE_SERVER_HOST: hive-server
      HIVE_SERVER_PORT: 10000
      HIVE_SERVER_URL: jdbc:hive2://hive-server:10000/default
      PYTHONPATH: /materials:/opt/bitnami/spark/python:/opt/bitnami/spark/python/lib/py4j-0.10.9.7-src.zip
    command: >
      bash -lc "/opt/bitnami/python/bin/jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --ServerApp.token=''
      --ServerApp.password=''
      --notebook-dir=/materials"
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./materials:/materials
      - ./materials/seminar_02_raw/data:/home/student/seminar_02_raw/data:ro

  airflow-init:
    build:
      context: ./docker/airflow
    container_name: airflow-init
    depends_on:
      postgres-airflow:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__WEBSERVER__SECRET_KEY: lab_secret_key
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command: version
    volumes:
      - ./docker/airflow/dags:/opt/airflow/dags
      - ./docker/airflow/logs:/opt/airflow/logs

  airflow-webserver:
    build:
      context: ./docker/airflow
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-dwh:
        condition: service_healthy
      minio:
        condition: service_healthy
      spark-master:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: lab_secret_key
      POSTGRES_HOST: postgres-dwh
      POSTGRES_PORT: 5432
      POSTGRES_DB: dwh
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password123
      S3_BUCKET: datalake
      SPARK_MASTER_URL: spark://spark-master:7077
      PYTHONPATH: /opt/airflow
    command: webserver
    ports:
      - "8088:8080"
    volumes:
      - ./docker/airflow/dags:/opt/airflow/dags
      - ./docker/airflow/logs:/opt/airflow/logs

  airflow-scheduler:
    build:
      context: ./docker/airflow
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-dwh:
        condition: service_healthy
      minio:
        condition: service_healthy
      spark-master:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: lab_secret_key
      POSTGRES_HOST: postgres-dwh
      POSTGRES_PORT: 5432
      POSTGRES_DB: dwh
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password123
      S3_BUCKET: datalake
      SPARK_MASTER_URL: spark://spark-master:7077
      PYTHONPATH: /opt/airflow
    command: scheduler
    volumes:
      - ./docker/airflow/dags:/opt/airflow/dags
      - ./docker/airflow/logs:/opt/airflow/logs

volumes:
  postgres_dwh_data:
  postgres_airflow_data:
  minio_data:
  hadoop_namenode:
  hadoop_datanode:
  hive_metastore_postgres_data:
