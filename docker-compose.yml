services:
  postgres-dwh:
    image: postgres:16
    container_name: postgres-dwh
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: dwh
    ports:
      - "5432:5432"
    volumes:
      - postgres_dwh_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      - ./materials/lecture_01_postgres/data:/data/lecture_01:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d dwh"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-airflow:
    image: postgres:16
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin password123 &&
      mc mb --ignore-existing local/datalake &&
      mc anonymous set download local/datalake
      "

  spark-master:
    build:
      context: ./docker/spark
    container_name: spark-master
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./:/app

  spark-worker:
    build:
      context: ./docker/spark
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    ports:
      - "8081:8081"
    volumes:
      - ./:/app

  jupyter:
    build:
      context: ./docker/spark
    container_name: jupyter
    depends_on:
      - spark-master
      - spark-worker
      - postgres-dwh
      - minio
    environment:
      SPARK_MASTER_URL: spark://spark-master:7077
      POSTGRES_HOST: postgres-dwh
      POSTGRES_PORT: 5432
      POSTGRES_DB: dwh
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password123
      S3_BUCKET: datalake
      PYTHONPATH: /materials
    command: >
      bash -lc "/opt/bitnami/python/bin/python -m pip install --no-cache-dir boto3 jupyter jupyterlab psycopg2-binary 'pyspark==3.5.*' &&
      /opt/bitnami/python/bin/jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --ServerApp.token=''
      --ServerApp.password=''
      --notebook-dir=/materials"
    ports:
      - "8888:8888"
    volumes:
      - ./materials:/materials

  airflow-init:
    build:
      context: ./docker/airflow
    container_name: airflow-init
    depends_on:
      postgres-airflow:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__WEBSERVER__SECRET_KEY: lab_secret_key
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command: version
    volumes:
      - ./docker/airflow/dags:/opt/airflow/dags
      - ./docker/airflow/logs:/opt/airflow/logs

  airflow-webserver:
    build:
      context: ./docker/airflow
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-dwh:
        condition: service_healthy
      minio:
        condition: service_healthy
      spark-master:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: lab_secret_key
      POSTGRES_HOST: postgres-dwh
      POSTGRES_PORT: 5432
      POSTGRES_DB: dwh
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password123
      S3_BUCKET: datalake
      SPARK_MASTER_URL: spark://spark-master:7077
      PYTHONPATH: /opt/airflow
    command: webserver
    ports:
      - "8088:8080"
    volumes:
      - ./docker/airflow/dags:/opt/airflow/dags
      - ./docker/airflow/logs:/opt/airflow/logs

  airflow-scheduler:
    build:
      context: ./docker/airflow
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-dwh:
        condition: service_healthy
      minio:
        condition: service_healthy
      spark-master:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: lab_secret_key
      POSTGRES_HOST: postgres-dwh
      POSTGRES_PORT: 5432
      POSTGRES_DB: dwh
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password123
      S3_BUCKET: datalake
      SPARK_MASTER_URL: spark://spark-master:7077
      PYTHONPATH: /opt/airflow
    command: scheduler
    volumes:
      - ./docker/airflow/dags:/opt/airflow/dags
      - ./docker/airflow/logs:/opt/airflow/logs

volumes:
  postgres_dwh_data:
  postgres_airflow_data:
  minio_data:
